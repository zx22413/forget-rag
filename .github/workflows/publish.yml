name: publish

# Triggered by a GitHub Release. Uses OIDC trusted publishing — no
# API token needed. Both packages must have a trusted publisher
# registered on PyPI pointing at this workflow file.
#
# Setup once on PyPI (https://pypi.org/manage/account/publishing/):
#   - Project: forget-rag    | owner: zx22413 | repo: forget-rag
#     workflow: publish.yml  | environment: pypi
#   - Project: mem-broom     | (same as above)
#
# Tag + release flow:
#   git tag v0.1.0
#   git push origin v0.1.0
#   gh release create v0.1.0 --notes-from-tag

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.12

      - name: Build forget-rag
        working-directory: packages/forget-rag
        run: uv build --out-dir ../../dist-forget-rag

      - name: Build mem-broom
        working-directory: packages/mem-broom
        run: uv build --out-dir ../../dist-mem-broom

      - name: Upload forget-rag artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-forget-rag
          path: dist-forget-rag/

      - name: Upload mem-broom artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-mem-broom
          path: dist-mem-broom/

  publish-forget-rag:
    name: Publish forget-rag to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/forget-rag
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-forget-rag
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-mem-broom:
    name: Publish mem-broom to PyPI
    needs: [build, publish-forget-rag]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/mem-broom
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-mem-broom
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
