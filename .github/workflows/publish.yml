name: publish

# Triggered by a GitHub Release. Uses OIDC trusted publishing — no
# API token needed.
#
# v0.1 publishes ONLY `forget-rag` to PyPI. `mem-broom` is git-install
# only for v0.1 because PyPI's Pending Trusted Publisher form returns
# 500 when adding a second pending publisher under the same account
# (reproduced across multiple project names: mem-broom, forget-rag-broom,
# and an unrelated test name). Tracking issue: see SECURITY.md for the
# follow-up filed at github.com/pypi/support.
#
# Once that bug is resolved, restore the `publish-mem-broom` job and
# add a second `Pending Publisher` entry on PyPI:
#   - Project: mem-broom (or whatever name passes typosquat by then)
#     owner: zx22413 | repo: forget-rag
#     workflow: publish.yml | environment: pypi
#
# The mem-broom build step below still runs, so wheel/sdist are
# produced and attached to the GitHub Release as artifacts. Users can
# install from those, or `pip install git+https://...#subdirectory=`.
#
# Setup once on PyPI (https://pypi.org/manage/account/publishing/):
#   - Project: forget-rag | owner: zx22413 | repo: forget-rag
#     workflow: publish.yml | environment: pypi
#
# Tag + release flow:
#   git tag v0.1.0
#   git push origin v0.1.0
#   gh release create v0.1.0 --notes-from-tag

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.12

      - name: Build forget-rag
        working-directory: packages/forget-rag
        run: uv build --out-dir ../../dist-forget-rag

      - name: Build mem-broom
        working-directory: packages/mem-broom
        run: uv build --out-dir ../../dist-mem-broom

      - name: Upload forget-rag artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-forget-rag
          path: dist-forget-rag/

      - name: Upload mem-broom artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-mem-broom
          path: dist-mem-broom/

  publish-forget-rag:
    name: Publish forget-rag to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/forget-rag
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-forget-rag
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
