[project]
name = "forget-rag"
version = "0.1.0"
description = "A forgetting layer for RAG systems."
readme = "../../README.md"
license = { text = "MIT" }
authors = [{ name = "LBDog" }]
requires-python = ">=3.11"
keywords = ["rag", "llm", "memory", "forgetting", "knowledge-management"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = []

[project.urls]
Homepage = "https://github.com/LBDog/forget-rag"
Issues = "https://github.com/LBDog/forget-rag/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/forget_rag"]
