[project]
name = "mem-broom"
version = "0.1.0"
description = "CLI broom for forget-rag — sweep stale chunks out of your RAG memory."
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "LBDog" }]
requires-python = ">=3.11"
keywords = ["rag", "cli", "memory", "forgetting"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Environment :: Console",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "forget-rag",
    "typer>=0.12",
    "rich>=13",
]

[project.scripts]
mem-broom = "mem_broom.cli:app"

[project.urls]
Homepage = "https://github.com/LBDog/forget-rag"
Issues = "https://github.com/LBDog/forget-rag/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mem_broom"]

[tool.uv.sources]
forget-rag = { workspace = true }
