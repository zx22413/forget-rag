[project]
# PyPI distribution name. The CLI command stays `mem-broom` (see [project.scripts]
# below). Renamed from `mem-broom` because PyPI's typosquat detection flagged it
# as too similar to the existing `broom` package and rejected with a 500 error.
name = "forget-rag-broom"
version = "0.1.0"
description = "CLI broom for forget-rag — sweep stale chunks out of your RAG memory. Installs the `mem-broom` command."
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "LBDog" }]
requires-python = ">=3.11"
keywords = [
    "rag",
    "cli",
    "memory",
    "forgetting",
    "knowledge-management",
    "typer",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Utilities",
]
dependencies = [
    "forget-rag>=0.1.0",
    "typer>=0.12",
    "rich>=13",
]

[project.scripts]
mem-broom = "mem_broom.cli:app"

[project.urls]
Homepage = "https://github.com/zx22413/forget-rag"
Repository = "https://github.com/zx22413/forget-rag"
Documentation = "https://github.com/zx22413/forget-rag/blob/main/packages/mem-broom/README.md"
Changelog = "https://github.com/zx22413/forget-rag/blob/main/CHANGELOG.md"
Issues = "https://github.com/zx22413/forget-rag/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mem_broom"]

[tool.uv.sources]
forget-rag = { workspace = true }
